site_name: PortalRH Documentation
site_description: Human Resources Management System documentation built with Django REST Framework and React + TypeScript.
site_author: GabrielDLobo
site_url: https://gabrieldlobo.github.io/01-PortalRH/
repo_url: https://github.com/GabrielDLobo/01-PortalRH
repo_name: GabrielDLobo/01-PortalRH
docs_dir: docs
site_dir: site
use_directory_urls: true
copyright: Copyright &copy; 2026 GabrielDLobo

theme:
  name: material
  language: en
  palette:
    scheme: default
    primary: green
    accent: indigo
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    logo: material/book-open-page-variant

nav:
  - Home: index.md
  - Overview: overview.md
  - Prerequisites: prerequisites.md
  - Installation: installation.md
  - Configuration: configuration.md
  - Quick Start: quick-start.md
  - Guidelines and Standards: guidelines.md
  - Project Structure: structure.md
  - Development: development.md
  - Testing: testing.md
  - API Endpoints: api-endpoints.md
  - System Modeling: system-modeling.md
  - Authentication and Security: authentication.md
  - Deployment: deployment.md
  - Contributing: contributing.md
  - Release Notes: release-notes.md

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true