[tool.ruff]
line-length = 100
target-version = "py310"
extend-exclude = [
  "site",
  "frontend/build",
  "venv",
]

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = ["E501"]

[tool.taskipy.tasks]
run = "python manage.py runserver"
migrate = "python manage.py migrate"
makemigrations = "python manage.py makemigrations"
test = "python manage.py test"
lint = "ruff check ."
format = "ruff format ."
docs = "mkdocs serve -a 127.0.0.1:8001"
docs_build = "mkdocs build --clean"
docs_deploy = "mkdocs gh-deploy --clean"
